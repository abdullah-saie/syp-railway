<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>SYP Markets</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070a0e;--bg1:#0c1118;--bg2:#111920;--bg3:#182030;
  --bd:#1a2433;--bd2:#243040;
  --txt:#c8d8e8;--muted:#45607a;--dim:#28384a;
  --green:#0ecb81;--red:#f6465d;--gold:#f0b429;--blue:#4080ff;
  --mono:'Geist Mono',monospace;--sans:'Syne',sans-serif;--r:6px;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-rows:46px 1fr 24px;height:100vh}
.body{display:grid;grid-template-columns:220px 1fr;overflow:hidden}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;background:var(--bg1);border-bottom:1px solid var(--bd);padding:0 12px;overflow:hidden}
.logo{font-family:var(--sans);font-weight:800;font-size:16px;letter-spacing:-.03em;display:flex;align-items:center;gap:6px;padding-right:12px;border-right:1px solid var(--bd);white-space:nowrap;flex-shrink:0}
.logo em{color:var(--muted);font-style:normal}
.live-pill{font-size:8px;font-family:var(--mono);font-weight:600;background:var(--green);color:#000;padding:2px 6px;border-radius:20px;letter-spacing:.1em}
.ticker-scroll{display:flex;gap:0;flex:1;overflow:hidden}
.tick{display:flex;align-items:center;gap:6px;padding:0 10px;border-right:1px solid var(--bd);white-space:nowrap;height:46px;cursor:pointer;transition:background .1s;flex-shrink:0}
.tick:hover,.tick.act{background:var(--bg2)}
.tick-sym{font-size:9px;color:var(--muted);letter-spacing:.08em}
.tick-price{font-size:12px;font-weight:600}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.clock{font-size:10px;color:var(--muted)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #0ecb8140}50%{box-shadow:0 0 0 5px transparent}}
.up{color:var(--green)}.dn{color:var(--red)}.neu{color:var(--muted)}

/* SIDEBAR */
.sidebar{background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-search{padding:8px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sb-search input{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:6px 10px;font-family:var(--mono);font-size:11px;color:var(--txt);outline:none;transition:border-color .15s}
.sb-search input:focus{border-color:var(--blue)}
.sb-search input::placeholder{color:var(--muted)}
.sb-tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.sb-tab{flex:1;text-align:center;padding:7px 4px;font-size:9px;letter-spacing:.08em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.sb-tab:hover{color:var(--txt)}
.sb-tab.act{color:var(--gold);border-bottom-color:var(--gold)}
.pairs-list{flex:1;overflow-y:auto;padding:4px 0}
.pairs-list::-webkit-scrollbar{width:3px}
.pairs-list::-webkit-scrollbar-thumb{background:var(--bd2)}
.group-label{font-size:8px;letter-spacing:.14em;color:var(--dim);padding:10px 12px 4px;text-transform:uppercase;font-weight:500}
.pair-row{display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .1s;border-left:2px solid transparent;padding:7px 12px;margin:0;border-radius:0}
.pair-row:hover{background:var(--bg2)}
.pair-row.act{background:var(--bg2);border-left-color:var(--gold)}
.pr-left{display:flex;align-items:center;gap:8px}
.pr-icon{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.pr-sym{font-size:11px;font-weight:600}
.pr-name{font-size:9px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.pr-right{text-align:right}
.pr-price{font-size:11px;font-weight:600}
.pr-unit{font-size:9px;color:var(--muted);margin-top:2px}

/* MAIN */
.main{display:flex;flex-direction:column;overflow:hidden}
.chart-header{display:flex;align-items:center;gap:0;background:var(--bg1);border-bottom:1px solid var(--bd);padding:0 10px;height:42px;flex-shrink:0;overflow-x:auto}
.chart-header::-webkit-scrollbar{display:none}
.ch-pair{display:flex;align-items:center;gap:8px;padding-right:12px;border-right:1px solid var(--bd);margin-right:10px;flex-shrink:0}
.ch-icon{font-size:18px}
.ch-sym{font-family:var(--sans);font-weight:700;font-size:15px;letter-spacing:-.02em}
.ch-name{font-size:10px;color:var(--muted)}
.ch-price{font-family:var(--mono);font-size:20px;font-weight:700;margin-right:6px;transition:color .3s;flex-shrink:0}
.ch-price.flash-up{color:var(--green)}.ch-price.flash-dn{color:var(--red)}
.ch-bs{display:flex;gap:10px;font-size:10px;flex-shrink:0}
.ch-buy{color:var(--green)}.ch-sell{color:var(--red)}
.ch-unit{font-size:9px;color:var(--muted);margin-right:auto}
.ch-pts{font-size:9px;color:var(--muted);flex-shrink:0;padding:2px 7px;background:var(--bg2);border-radius:3px;border:1px solid var(--bd)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;background:var(--bg1);border-bottom:1px solid var(--bd);padding:0 6px;height:32px;flex-shrink:0;overflow-x:auto}
.toolbar::-webkit-scrollbar{display:none}
.tb-g{display:flex;gap:0;padding:0 4px;border-right:1px solid var(--bd)}
.tb-g:last-child{border-right:none;margin-left:auto}
.tb-btn{font-family:var(--mono);font-size:10px;background:none;border:none;color:var(--muted);padding:3px 7px;border-radius:4px;cursor:pointer;transition:all .1s;white-space:nowrap}
.tb-btn:hover{background:var(--bg3);color:var(--txt)}
.tb-btn.act{background:var(--bg3);color:var(--gold)}

/* CHART */
.chart-wrap{flex:1;position:relative;overflow:hidden}
#chart{width:100%;height:100%}
.draw-tools{position:absolute;left:8px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:3px;background:var(--bg1);border:1px solid var(--bd2);padding:5px;border-radius:8px;z-index:10}
.dt-btn{width:28px;height:28px;border-radius:4px;border:1px solid transparent;background:none;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.dt-btn:hover{background:var(--bg3);color:var(--txt);border-color:var(--bd2)}
.dt-btn.act{background:var(--bg3);color:var(--gold);border-color:#f0b42940}
.dt-sep{height:1px;background:var(--bd);margin:1px 0}
.xbar{position:absolute;top:7px;left:48px;display:flex;gap:8px;background:var(--bg1)dd;border:1px solid var(--bd2);padding:4px 10px;border-radius:var(--r);font-size:10px;pointer-events:none;opacity:0;transition:opacity .1s;backdrop-filter:blur(8px)}
.xbar.show{opacity:1}
.xi{display:flex;gap:4px}.xl{color:var(--muted)}.xv{font-weight:600}

/* EMPTY STATE */
.empty{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.empty.show{display:flex}
.empty-icon{font-size:40px;opacity:.2}
.empty-title{font-size:13px;font-weight:600;color:var(--muted)}
.empty-sub{font-size:10px;color:var(--dim);text-align:center;max-width:220px;line-height:1.6}
.empty-progress{width:200px;height:2px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:4px}
.empty-bar{height:100%;background:var(--green);border-radius:2px;animation:prog 2s ease-in-out infinite}
@keyframes prog{0%{width:0}50%{width:70%}100%{width:100%}}

/* LOADER */
.loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--bg);z-index:20;transition:opacity .25s}
.loader.gone{opacity:0;pointer-events:none}
.spin{width:22px;height:22px;border:2px solid var(--bd2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{font-size:9px;color:var(--muted);letter-spacing:.14em}

/* STATUSBAR */
.statusbar{display:flex;align-items:center;gap:10px;padding:0 12px;background:var(--bg1);border-top:1px solid var(--bd);font-size:9px;color:var(--muted);overflow:hidden;letter-spacing:.04em}
.sb-sep{color:var(--bd2)}

/* MOBILE */
@media(max-width:700px){
  .body{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .sidebar{order:2;max-height:38vh;border-right:none;border-top:1px solid var(--bd)}
  .draw-tools{display:none}
  .ticker-scroll .tick:nth-child(n+4){display:none}
  .ch-bs{display:none}
}
</style>
</head>
<body>
<div class="app">

<header class="topbar">
  <div class="logo">SYP<em>markets</em><span class="live-pill">LIVE</span></div>
  <div class="ticker-scroll" id="ticker"></div>
  <div class="topbar-r">
    <div class="dot" id="conn-dot"></div>
    <div class="clock" id="clock"></div>
  </div>
</header>

<div class="body">
<aside class="sidebar">
  <div class="sb-search"><input id="search" placeholder="Search pairs…" autocomplete="off"/></div>
  <div class="sb-tabs">
    <div class="sb-tab act" data-group="all">ALL</div>
    <div class="sb-tab" data-group="fx">FX</div>
    <div class="sb-tab" data-group="crypto">CRYPTO</div>
    <div class="sb-tab" data-group="gold">GOLD</div>
    <div class="sb-tab" data-group="fuel">FUEL</div>
  </div>
  <div class="pairs-list" id="pairs-list"></div>
</aside>

<main class="main">
  <div class="chart-header">
    <div class="ch-pair">
      <span class="ch-icon" id="ch-icon">💱</span>
      <div><div class="ch-sym" id="ch-sym">—</div><div class="ch-name" id="ch-name">Select a pair</div></div>
    </div>
    <div class="ch-price" id="ch-price">—</div>
    <div class="ch-bs">
      <span class="ch-buy">B: <span id="ch-buy">—</span></span>
      <span class="ch-sell">S: <span id="ch-sell">—</span></span>
    </div>
    <div class="ch-unit" id="ch-unit"></div>
    <div class="ch-pts" id="ch-pts"></div>
  </div>

  <div class="toolbar">
    <div class="tb-g">
      <button class="tb-btn" data-tf="1m">1m</button>
      <button class="tb-btn" data-tf="5m">5m</button>
      <button class="tb-btn" data-tf="15m">15m</button>
      <button class="tb-btn" data-tf="30m">30m</button>
      <button class="tb-btn act" data-tf="1H">1H</button>
      <button class="tb-btn" data-tf="4H">4H</button>
      <button class="tb-btn" data-tf="1D">1D</button>
      <button class="tb-btn" data-tf="1W">1W</button>
      <button class="tb-btn" data-tf="1M">1M</button>
    </div>
    <div class="tb-g">
      <button class="tb-btn act" data-ct="candle">🕯</button>
      <button class="tb-btn" data-ct="area">◿</button>
      <button class="tb-btn" data-ct="line">╱</button>
      <button class="tb-btn" data-ct="bar">▌</button>
    </div>
    <div class="tb-g">
      <button class="tb-btn" id="btn-refresh">↺</button>
      <button class="tb-btn" id="btn-fit">⊡ Fit</button>
      <button class="tb-btn" id="btn-shot">📷</button>
    </div>
  </div>

  <div class="chart-wrap" id="chart-wrap">
    <div id="chart"></div>
    <div class="draw-tools">
      <button class="dt-btn act" data-tool="cursor" title="Cursor (V)">↖</button>
      <div class="dt-sep"></div>
      <button class="dt-btn" data-tool="hline" title="Horizontal Line (H)">—</button>
      <button class="dt-btn" data-tool="vline" title="Vertical Line">|</button>
      <div class="dt-sep"></div>
      <button class="dt-btn" id="btn-clear" title="Clear drawings" style="color:var(--red);font-size:11px">✕</button>
    </div>
    <div class="xbar" id="xbar">
      <div class="xi"><span class="xl">O</span><span class="xv" id="xo">—</span></div>
      <div class="xi"><span class="xl">H</span><span class="xv up" id="xh">—</span></div>
      <div class="xi"><span class="xl">L</span><span class="xv dn" id="xl2">—</span></div>
      <div class="xi"><span class="xl">C</span><span class="xv" id="xc">—</span></div>
    </div>
    <div class="loader" id="loader">
      <div class="spin"></div>
      <div class="loader-msg" id="loader-msg">LOADING</div>
    </div>
    <div class="empty" id="empty">
      <div class="empty-icon">📡</div>
      <div class="empty-title" id="empty-title">No chart data yet</div>
      <div class="empty-sub" id="empty-sub">The backend is collecting real data. Check back in a few minutes as prices are scraped every 5 minutes.</div>
      <div class="empty-progress"><div class="empty-bar"></div></div>
    </div>
  </div>
</main>
</div>

<div class="statusbar">
  <span id="sb-conn">Connecting…</span>
  <span class="sb-sep">·</span>
  <span id="sb-pair">No pair selected</span>
  <span class="sb-sep">·</span>
  <span id="sb-pts"></span>
  <span class="sb-sep">·</span>
  <span>sp-today.com · CoinGecko · auto-refresh 5min</span>
</div>
</div>

<script>
// Auto-detect: on Railway frontend is served by backend (same origin)
// On localhost dev: backend runs on port 8000
const API = (window.location.hostname === 'localhost' && window.location.port === '3000')
  ? 'http://localhost:8000'
  : window.location.origin.includes('localhost:3000')
    ? 'http://localhost:8000'
    : '';
const REFRESH_MS = 5 * 60 * 1000;

let chart, mainSeries;
let currentTF = '1H', currentCT = 'candle';
let currentPair = null;
let allPairs = [];
let filteredGroup = 'all', searchQ = '';
let drawnSeries = [], activeTool = 'cursor';
let cache = {};   // symbol+tf → candle data

// ── DEMO PAIRS (when backend is offline) ──────────────────────────────────
const DEMO_PAIRS = [
  {symbol:'USD', name:'US Dollar',      group:'fx',    icon:'🇺🇸',unit:'SYP',buy:11780,sell:11850},
  {symbol:'EUR', name:'Euro',           group:'fx',    icon:'🇪🇺',unit:'SYP',buy:13800,sell:14000},
  {symbol:'TRY', name:'Turkish Lira',   group:'fx',    icon:'🇹🇷',unit:'SYP',buy:266,  sell:270},
  {symbol:'SAR', name:'Saudi Riyal',    group:'fx',    icon:'🇸🇦',unit:'SYP',buy:3109, sell:3159},
  {symbol:'AED', name:'UAE Dirham',     group:'fx',    icon:'🇦🇪',unit:'SYP',buy:3175, sell:3226},
  {symbol:'EGP', name:'Egyptian Pound', group:'fx',    icon:'🇪🇬',unit:'SYP',buy:243,  sell:247},
  {symbol:'GBP', name:'British Pound',  group:'fx',    icon:'🇬🇧',unit:'SYP',buy:14800,sell:15000},
  {symbol:'KWD', name:'Kuwaiti Dinar',  group:'fx',    icon:'🇰🇼',unit:'SYP',buy:38000,sell:39000},
  {symbol:'BTC', name:'Bitcoin',        group:'crypto',icon:'₿',  unit:'USD',buy:103420,sell:103420},
  {symbol:'ETH', name:'Ethereum',       group:'crypto',icon:'Ξ',  unit:'USD',buy:3840,  sell:3840},
  {symbol:'BNB', name:'BNB',            group:'crypto',icon:'⬡',  unit:'USD',buy:612,   sell:612},
  {symbol:'XAU', name:'Gold Ounce',     group:'gold',  icon:'🥇', unit:'USD',buy:5279,  sell:5279},
  {symbol:'XAU_24K',name:'Gold 24K/g',  group:'gold',  icon:'🥇', unit:'SYP',buy:1999200,sell:2019400},
  {symbol:'FUEL_GAS',name:'Gasoline',   group:'fuel',  icon:'⛽', unit:'SYP',buy:10070, sell:10070},
  {symbol:'FUEL_DSL',name:'Diesel',     group:'fuel',  icon:'🛢️', unit:'SYP',buy:8890,  sell:8890},
];

// ── CHART ─────────────────────────────────────────────────────────────────
function initChart() {
  const wrap = document.getElementById('chart-wrap');
  chart = LightweightCharts.createChart(document.getElementById('chart'), {
    width:  wrap.clientWidth,
    height: wrap.clientHeight,
    layout:{ background:{color:'#070a0e'}, textColor:'#45607a', fontFamily:"'Geist Mono',monospace", fontSize:11 },
    grid:{ vertLines:{color:'#0c1118'}, horzLines:{color:'#0c1118'} },
    crosshair:{
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine:{ color:'#4080ff30', labelBackgroundColor:'#0c1118' },
      horzLine:{ color:'#4080ff30', labelBackgroundColor:'#0c1118' },
    },
    rightPriceScale:{ borderColor:'#1a2433', scaleMargins:{top:.08,bottom:.05} },
    timeScale:{ borderColor:'#1a2433', timeVisible:true, secondsVisible:true, rightOffset:6 },
    handleScroll:{ mouseWheel:true, pressedMouseMove:true, horzTouchDrag:true },
    handleScale:{ axisPressedMouseMove:true, mouseWheel:true, pinch:true },
  });

  chart.subscribeCrosshairMove(p => {
    const xbar = document.getElementById('xbar');
    if (!p.time || !mainSeries) { xbar.classList.remove('show'); return; }
    const d = p.seriesData?.get(mainSeries);
    if (!d) { xbar.classList.remove('show'); return; }
    xbar.classList.add('show');
    const f = v => v != null ? fmtP(v) : '—';
    document.getElementById('xo').textContent = f(d.open  ?? d.value);
    document.getElementById('xh').textContent = f(d.high  ?? d.value);
    document.getElementById('xl2').textContent= f(d.low   ?? d.value);
    document.getElementById('xc').textContent = f(d.close ?? d.value);
  });

  new ResizeObserver(() => {
    chart.applyOptions({ width: wrap.clientWidth, height: wrap.clientHeight });
  }).observe(wrap);
}

function makeSeries(ct) {
  if (mainSeries) { try { chart.removeSeries(mainSeries); } catch(e){} mainSeries = null; }
  if (ct === 'candle') {
    mainSeries = chart.addCandlestickSeries({
      upColor:'#0ecb81', downColor:'#f6465d',
      borderUpColor:'#0ecb81', borderDownColor:'#f6465d',
      wickUpColor:'#0ecb8160', wickDownColor:'#f6465d60',
    });
  } else if (ct === 'area') {
    mainSeries = chart.addAreaSeries({ lineColor:'#4080ff', topColor:'#4080ff28', bottomColor:'transparent', lineWidth:2 });
  } else if (ct === 'bar') {
    mainSeries = chart.addBarSeries({ upColor:'#0ecb81', downColor:'#f6465d' });
  } else {
    mainSeries = chart.addLineSeries({ color:'#0ecb81', lineWidth:2 });
  }
}

function toSD(raw, ct) {
  if (ct === 'candle' || ct === 'bar') return raw;
  return raw.map(d => ({ time:d.time, value:(d.open+d.close)/2 }));
}

// ── PAIR SELECTION ────────────────────────────────────────────────────────
async function selectPair(pair) {
  currentPair = pair;
  document.getElementById('ch-icon').textContent  = pair.icon;
  document.getElementById('ch-sym').textContent   = `${pair.symbol}/SYP`;
  document.getElementById('ch-name').textContent  = pair.name;
  document.getElementById('ch-unit').textContent  = pair.unit;
  document.getElementById('ch-buy').textContent   = fmtP(pair.buy);
  document.getElementById('ch-sell').textContent  = fmtP(pair.sell);
  document.getElementById('sb-pair').textContent  = `${pair.symbol} · ${pair.name}`;

  const mid = pair.buy && pair.sell ? (pair.buy + pair.sell) / 2 : null;
  const el  = document.getElementById('ch-price');
  el.textContent = mid ? fmtP(mid) : '—';

  document.querySelectorAll('.pair-row').forEach(r =>
    r.classList.toggle('act', r.dataset.sym === pair.symbol));
  document.querySelectorAll('.tick').forEach(t =>
    t.classList.toggle('act', t.dataset.sym === pair.symbol));

  await loadChart(pair);
}

async function loadChart(pair) {
  setLoading(true, 'FETCHING DATA…');
  document.getElementById('empty').classList.remove('show');

  const key = `${pair.symbol}_${currentTF}`;

  // Use cache if available (cleared on refresh)
  let data = cache[key];
  if (!data) {
    try {
      const r = await fetch(`${API}/api/history?currency=${pair.symbol}&tf=${currentTF}&limit=5000`);
      if (!r.ok) throw new Error(await r.text());
      const j = await r.json();
      data = j.data || [];
      if (data.length) {
        cache[key] = data;
        document.getElementById('ch-pts').textContent = `${j.real_ticks} ticks → ${data.length} candles`;
        document.getElementById('sb-pts').textContent = `${j.real_ticks} real ticks · ${data.length} ${currentTF} candles`;
      }
    } catch(e) {
      console.warn('API error:', e);
      data = [];
    }
  }

  setLoading(false);

  if (!data.length) {
    // Show "still collecting" message — NO fake data
    showEmpty(pair);
    return;
  }

  document.getElementById('empty').classList.remove('show');
  makeSeries(currentCT);
  mainSeries.setData(toSD(data, currentCT));
  chart.timeScale().fitContent();
}

function showEmpty(pair) {
  document.getElementById('empty').classList.add('show');
  document.getElementById('empty-title').textContent = `No ${currentTF} data for ${pair.symbol}`;

  const tfMin = {
    '1m': 'a few minutes',
    '5m': '5 minutes',
    '15m': '15 minutes',
    '30m': '30 minutes',
    '1H': '1 hour',
    '4H': '4 hours',
    '1D': '1 day',
  };
  document.getElementById('empty-sub').textContent =
    `Real data is scraped every 5 minutes. ` +
    `You need at least ${tfMin[currentTF] || 'some time'} of collected data ` +
    `to see a ${currentTF} candle. Keep the backend running and check back soon.`;
  document.getElementById('ch-pts').textContent = 'no data yet';
}

// ── PAIRS LIST ────────────────────────────────────────────────────────────
const GRP_ORDER = ['fx','crypto','gold','fuel','other'];
const GRP_LABEL = {fx:'Forex',crypto:'Crypto',gold:'Gold',fuel:'Fuel',other:'Other'};

function renderList() {
  let pairs = allPairs;
  if (filteredGroup !== 'all') pairs = pairs.filter(p => p.group === filteredGroup);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    pairs = pairs.filter(p => p.symbol.toLowerCase().includes(q) || p.name.toLowerCase().includes(q));
  }
  if (!pairs.length) {
    document.getElementById('pairs-list').innerHTML =
      `<div style="padding:20px;text-align:center;color:var(--muted);font-size:10px">No pairs found</div>`;
    return;
  }
  const grp = {};
  for (const p of pairs) { if (!grp[p.group]) grp[p.group]=[]; grp[p.group].push(p); }
  let html = '';
  for (const g of GRP_ORDER) {
    if (!grp[g]) continue;
    if (filteredGroup === 'all') html += `<div class="group-label">${GRP_LABEL[g]}</div>`;
    for (const p of grp[g]) {
      const mid  = p.buy && p.sell ? (p.buy+p.sell)/2 : null;
      const isAct = currentPair?.symbol === p.symbol;
      html += `<div class="pair-row ${isAct?'act':''}" data-sym="${p.symbol}">
        <div class="pr-left">
          <div class="pr-icon">${p.icon}</div>
          <div><div class="pr-sym">${p.symbol}</div><div class="pr-name">${p.name}</div></div>
        </div>
        <div class="pr-right">
          <div class="pr-price">${mid ? fmtP(mid) : '—'}</div>
          <div class="pr-unit">${p.unit}</div>
        </div>
      </div>`;
    }
  }
  document.getElementById('pairs-list').innerHTML = html;
  document.querySelectorAll('.pair-row').forEach(row => {
    row.addEventListener('click', () => {
      const p = allPairs.find(x => x.symbol === row.dataset.sym);
      if (p) selectPair(p);
    });
  });
}

function renderTicker() {
  document.getElementById('ticker').innerHTML = allPairs.slice(0,8).map(p => {
    const mid = p.buy && p.sell ? (p.buy+p.sell)/2 : null;
    return `<div class="tick" data-sym="${p.symbol}">
      <span class="tick-sym">${p.symbol}</span>
      <span class="tick-price">${mid ? fmtP(mid) : '—'}</span>
    </div>`;
  }).join('');
  document.querySelectorAll('.tick').forEach(t => {
    t.addEventListener('click', () => {
      const p = allPairs.find(x => x.symbol === t.dataset.sym);
      if (p) selectPair(p);
    });
  });
}

// ── DATA LOADING ──────────────────────────────────────────────────────────
async function loadPairs() {
  try {
    const r = await fetch(`${API}/api/pairs`);
    if (!r.ok) throw new Error();
    allPairs = await r.json();
    document.getElementById('sb-conn').textContent = `Live · ${allPairs.length} pairs`;
    document.getElementById('conn-dot').style.background = 'var(--green)';
  } catch(e) {
    allPairs = DEMO_PAIRS;
    document.getElementById('sb-conn').textContent = 'Demo · backend offline';
    document.getElementById('conn-dot').style.background = 'var(--red)';
  }
  renderList();
  renderTicker();
  if (!currentPair) {
    const first = allPairs.find(p => p.symbol === 'USD') || allPairs[0];
    if (first) await selectPair(first);
  }
}

async function refresh() {
  cache = {}; // clear cache to force fresh data
  await loadPairs();
  if (currentPair) await loadChart(currentPair);
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function fmtP(v) {
  if (v == null) return '—';
  if (v >= 1000)  return Math.round(v).toLocaleString();
  if (v >= 1)     return v.toLocaleString(undefined,{maximumFractionDigits:4});
  return v.toFixed(6);
}
function setLoading(on, msg='') {
  const el = document.getElementById('loader');
  if (on) { el.classList.remove('gone'); document.getElementById('loader-msg').textContent = msg; }
  else { el.classList.add('gone'); }
}
function setTool(tool) {
  activeTool = tool;
  document.querySelectorAll('.dt-btn[data-tool]').forEach(b =>
    b.classList.toggle('act', b.dataset.tool === tool));
  document.getElementById('chart-wrap').style.cursor = tool==='cursor'?'default':'crosshair';
}

// ── EVENTS ────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-tf]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('[data-tf]').forEach(x => x.classList.remove('act'));
  b.classList.add('act');
  currentTF = b.dataset.tf;
  if (currentPair) loadChart(currentPair);
}));

document.querySelectorAll('[data-ct]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('[data-ct]').forEach(x => x.classList.remove('act'));
  b.classList.add('act');
  currentCT = b.dataset.ct;
  if (currentPair) loadChart(currentPair);
}));

document.querySelectorAll('.sb-tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.sb-tab').forEach(x => x.classList.remove('act'));
  t.classList.add('act');
  filteredGroup = t.dataset.group;
  renderList();
}));

document.querySelectorAll('.dt-btn[data-tool]').forEach(b =>
  b.addEventListener('click', () => setTool(b.dataset.tool)));

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  renderList();
});

document.getElementById('btn-refresh').addEventListener('click', refresh);
document.getElementById('btn-fit').addEventListener('click', () => chart?.timeScale().fitContent());
document.getElementById('btn-shot').addEventListener('click', () => {
  if (!chart) return;
  const a = Object.assign(document.createElement('a'), {
    href: chart.takeScreenshot().toDataURL(),
    download: `${currentPair?.symbol||'chart'}-${Date.now()}.png`
  });
  a.click();
});
document.getElementById('btn-clear').addEventListener('click', () => {
  drawnSeries.forEach(s => { try { chart.removeSeries(s); } catch(e){} });
  drawnSeries.length = 0;
});

// H-Line drawing
document.getElementById('chart-wrap').addEventListener('click', e => {
  if (activeTool !== 'hline' || !mainSeries) return;
  const rect  = e.currentTarget.getBoundingClientRect();
  const price = mainSeries.coordinateToPrice?.(e.clientY - rect.top);
  if (price == null) return;
  const cached = cache[`${currentPair?.symbol}_${currentTF}`];
  if (!cached || cached.length < 2) return;
  const s = chart.addLineSeries({
    color:'#f0b42970', lineWidth:1,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible:false, lastValueVisible:true,
    title: fmtP(price),
  });
  s.setData([
    {time: cached[0].time,                   value: price},
    {time: cached[cached.length-1].time + 86400, value: price},
  ]);
  drawnSeries.push(s);
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key==='v'||e.key==='Escape') setTool('cursor');
  if (e.key==='h') setTool('hline');
  if (e.key==='f') chart?.timeScale().fitContent();
  if (e.key==='r') refresh();
});

// Clock
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);

// Boot
initChart();
setLoading(true, 'LOADING PAIRS');
loadPairs().then(() => setLoading(false));
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
